name: Nightly Apply Workflow

on:
  workflow_dispatch:
    inputs:
      resume:
        description: Resume from previous state.json
        type: boolean
        default: false
  schedule:
    # JST 03:00 = UTC 18:00 (前日)
    - cron: "0 18 * * *"

permissions:
  contents: read

jobs:
  nightly-apply:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          start=$(date +%s)
          status=success
          trap 'echo "npm ci|$(( $(date +%s) - start ))|${status}" >> "$timing_file"' EXIT
          npm ci || { status=failed; exit 1; }

      - name: Check required secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
        run: |
          missing=()
          if [ -z "${OPENAI_API_KEY}" ]; then
            missing+=("OPENAI_API_KEY")
          fi
          if [ -z "${GEMINI_API_KEY}" ] && [ -z "${NANO_BANANA_API_KEY}" ]; then
            missing+=("GEMINI_API_KEY or NANO_BANANA_API_KEY")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Error: Missing required GitHub Secrets: ${missing[*]}"
            echo "Configure them in Repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Required GitHub Secrets are configured: OPENAI_API_KEY, and GEMINI_API_KEY or NANO_BANANA_API_KEY"

      - name: Verify main branch
        env:
          CURRENT_REF: ${{ github.ref }}
        run: |
          if [ "${CURRENT_REF}" != "refs/heads/main" ]; then
            echo "Error: Nightly Apply Workflow must run on main branch. Current ref: ${CURRENT_REF}"
            exit 1
          fi
          echo "Verified branch: refs/heads/main"

      - name: Run quality pipeline apply
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          RESUME: ${{ github.event.inputs.resume }}
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          start=$(date +%s)
          status=success
          trap 'echo "quality-pipeline apply|$(( $(date +%s) - start ))|${status}" >> "$timing_file"' EXIT
          set +e
          if [ "${RESUME}" = "true" ]; then
            echo "Running quality pipeline apply with --resume (no --clean-latest)"
            npm run quality-pipeline -- --apply --resume
          else
            echo "Running quality pipeline apply with --clean-latest"
            npm run quality-pipeline -- --apply --clean-latest
          fi
          PIPELINE_EXIT_CODE=$?
          set -e
          echo "PIPELINE_EXIT_CODE=${PIPELINE_EXIT_CODE}" >> "$GITHUB_ENV"
          if [ "${PIPELINE_EXIT_CODE}" -eq 0 ]; then
            echo "Quality Pipeline completed successfully."
          elif [ "${PIPELINE_EXIT_CODE}" -eq 3 ]; then
            echo "Quality Pipeline completed with improvement recommended."
            exit 0
          else
            status=failed
            echo "Quality Pipeline failed with exit code ${PIPELINE_EXIT_CODE}."
            exit "${PIPELINE_EXIT_CODE}"
          fi

      - name: Write workflow summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PIPELINE_EXIT_CODE: ${{ env.PIPELINE_EXIT_CODE }}
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          pipeline_code="${PIPELINE_EXIT_CODE:-n/a}"
          if [ "$pipeline_code" = "0" ]; then
            quality_status="Publish Recommended"
          elif [ "$pipeline_code" = "3" ]; then
            quality_status="Improvement Recommended"
          elif [ "$pipeline_code" = "n/a" ]; then
            quality_status="(not reached)"
          else
            quality_status="Failed / Error"
          fi
          {
            echo "## Nightly Apply — Run Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Workflow | ${{ github.workflow }} |"
            echo "| Run ID | ${{ github.run_id }} |"
            echo "| Job result | ${JOB_STATUS} |"
            echo "| Pipeline exit code | ${pipeline_code} |"
            echo "| Quality status | ${quality_status} |"
            echo ""
            echo "### Step timings"
            echo ""
            echo "| Step | Duration (s) | Status |"
            echo "|------|--------------|--------|"
            if [ -f "$timing_file" ]; then
              while IFS='|' read -r name dur stat; do
                echo "| ${name} | ${dur} | ${stat} |"
              done < "$timing_file"
            else
              echo "| (none) | — | — |"
            fi
            echo ""
            echo "### Notes"
            echo ""
            echo "- npm cache: compare \`npm ci\` duration across runs (strict cache-hit is not logged in v1.14.0)."
            echo "- exit code 3 = improvement recommended (workflow may still succeed)."
            echo "- Failure details: see the workflow log and \`failure-summary.md\` artifact if present."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create failure summary
        if: failure()
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
        run: |
          mkdir -p reports/quality-pipeline/latest

          missing_secrets=()
          if [ -z "${OPENAI_API_KEY}" ]; then
            missing_secrets+=("OPENAI_API_KEY is not set")
          fi
          if [ -z "${GEMINI_API_KEY}" ] && [ -z "${NANO_BANANA_API_KEY}" ]; then
            missing_secrets+=("Neither GEMINI_API_KEY nor NANO_BANANA_API_KEY is set (at least one required)")
          fi

          {
            echo "# Nightly Apply Workflow — Failure Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Workflow | ${WORKFLOW_NAME} |"
            echo "| Run ID | ${RUN_ID} |"
            echo "| Ref | ${REF} |"
            echo "| Commit SHA | ${SHA} |"
            echo "| Actor | ${ACTOR} |"
            echo ""
            echo "## Possible causes"
            echo ""
            if [ "${#missing_secrets[@]}" -gt 0 ]; then
              for issue in "${missing_secrets[@]}"; do
                echo "- Missing required GitHub Secret: ${issue}"
              done
            fi
            if [ "${REF}" != "refs/heads/main" ]; then
              echo "- Workflow was not on main branch (expected \`refs/heads/main\`, got \`${REF}\`)"
            fi
            if [ "${#missing_secrets[@]}" -eq 0 ] && [ "${REF}" = "refs/heads/main" ]; then
              echo "- \`npm ci\` or \`quality-pipeline --apply\` may have failed — review the workflow log for the first failing step"
              echo "- API quota limits, pipeline phase errors, or environment issues during apply"
            fi
            METRICS_FILE="reports/quality-pipeline/latest/metrics.json"
            if [ -f "${METRICS_FILE}" ]; then
              node <<'NODE'
          const fs = require("node:fs");
          const metricsPath = "reports/quality-pipeline/latest/metrics.json";
          try {
            const metrics = JSON.parse(fs.readFileSync(metricsPath, "utf8"));
            const errors =
              metrics?.byPhase?.HEALTH_CHECK?.summary?.healthCheck?.errors ?? [];
            if (errors.length > 0) {
              console.log("");
              console.log("### Health Check Errors");
              console.log("");
              for (const item of errors) {
                console.log(`- ${item.label}: ${item.detail}`);
              }
            }
          } catch {
            // metrics parse failure — keep generic guidance only
          }
          NODE
            fi
            echo ""
            echo "## Next steps"
            echo ""
            echo "1. Download the \`nightly-apply-${RUN_ID}\` artifact from this workflow run"
            echo "2. Inspect \`state.json\`, \`report.json\`, \`metrics.json\`, and \`report.md\` if present"
            echo "3. Review \`reports/quality-pipeline/latest/export/\` for partial export output"
            echo "4. Fix the root cause and re-run via workflow_dispatch or wait for the next schedule"
          } > reports/quality-pipeline/latest/failure-summary.md

          echo "Created reports/quality-pipeline/latest/failure-summary.md"

      - name: Upload quality pipeline reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-apply-${{ github.run_id }}
          path: |
            reports/quality-pipeline/latest/report.md
            reports/quality-pipeline/latest/report.json
            reports/quality-pipeline/latest/metrics.json
            reports/quality-pipeline/latest/state.json
            reports/quality-pipeline/latest/failure-summary.md
            reports/quality-pipeline/latest/export/
          retention-days: 14
          if-no-files-found: warn
