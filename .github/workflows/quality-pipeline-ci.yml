name: Quality Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: quality-pipeline-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          start=$(date +%s)
          status=success
          trap 'echo "npm ci|$(( $(date +%s) - start ))|${status}" >> "$timing_file"' EXIT
          npm ci || { status=failed; exit 1; }

      - name: Run tests
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          start=$(date +%s)
          status=success
          trap 'echo "npm test|$(( $(date +%s) - start ))|${status}" >> "$timing_file"' EXIT
          npm test || { status=failed; exit 1; }

      - name: Dry-run with stop-before-phase
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          start=$(date +%s)
          status=success
          trap 'echo "quality-pipeline dry-run (stop-before-phase)|$(( $(date +%s) - start ))|${status}" >> "$timing_file"' EXIT
          npm run quality-pipeline:dry-run -- \
            --from-phase image-review \
            --max-rounds 1 \
            --clean-latest \
            --stop-before-phase report \
            || { status=failed; exit 1; }

      - name: Verify stop checkpoint
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import { RESUME_CHECKPOINT_STOP_REASON_BEFORE_PHASE } from "./src/lib/pipeline_resume.js";

          const checkpoint = JSON.parse(
            fs.readFileSync("reports/quality-pipeline/latest/state.json", "utf-8"),
          );

          if (checkpoint.status !== "resumable") {
            throw new Error(`expected resumable, got ${checkpoint.status}`);
          }
          if (checkpoint.stopReason !== RESUME_CHECKPOINT_STOP_REASON_BEFORE_PHASE) {
            throw new Error(`expected stopReason before-phase, got ${checkpoint.stopReason}`);
          }
          if (checkpoint.stopBeforePhase !== "REPORT") {
            throw new Error(`expected stopBeforePhase REPORT, got ${checkpoint.stopBeforePhase}`);
          }
          if (checkpoint.nextPhase !== "REPORT") {
            throw new Error(`expected nextPhase REPORT, got ${checkpoint.nextPhase}`);
          }
          if (fs.existsSync("reports/quality-pipeline/latest/report.json")) {
            throw new Error("report.json should not exist before resume");
          }
          EOF

      - name: Resume dry-run
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          start=$(date +%s)
          status=success
          trap 'echo "quality-pipeline dry-run (resume)|$(( $(date +%s) - start ))|${status}" >> "$timing_file"' EXIT
          npm run quality-pipeline:dry-run -- --resume || { status=failed; exit 1; }

      - name: Verify resume artifacts
        run: |
          test -f reports/quality-pipeline/latest/report.json
          test -f reports/quality-pipeline/latest/report.md
          test -f reports/quality-pipeline/latest/metrics.json
          test -f reports/quality-pipeline/latest/state.json
          test -f reports/quality-pipeline/latest/pipeline_state.json
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const checkpoint = JSON.parse(
            fs.readFileSync("reports/quality-pipeline/latest/state.json", "utf-8"),
          );

          if (checkpoint.status !== "completed") {
            throw new Error(`expected completed, got ${checkpoint.status}`);
          }
          if (checkpoint.stopReason !== null) {
            throw new Error(`expected stopReason null, got ${checkpoint.stopReason}`);
          }
          if (checkpoint.stopBeforePhase !== null) {
            throw new Error(`expected stopBeforePhase null, got ${checkpoint.stopBeforePhase}`);
          }
          EOF

      - name: Write workflow summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          timing_file="${RUNNER_TEMP}/gha-step-timing.tsv"
          lookup_timing() {
            local step_name="$1"
            if [ ! -f "$timing_file" ]; then
              echo "—"
              return
            fi
            while IFS='|' read -r name dur stat; do
              if [ "$name" = "$step_name" ]; then
                echo "${dur}s"
                return
              fi
            done < "$timing_file"
            echo "—"
          }
          npm_ci_duration="$(lookup_timing "npm ci")"
          node_version="$(node -v 2>/dev/null || echo n/a)"
          npm_version="$(npm -v 2>/dev/null || echo n/a)"
          lock_hash="n/a"
          if [ -f package-lock.json ]; then
            lock_hash="$(sha256sum package-lock.json | awk '{print $1}')"
          fi
          {
            echo "## Quality Pipeline CI — Run Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Workflow | ${{ github.workflow }} |"
            echo "| Run ID | ${{ github.run_id }} |"
            echo "| Job result | ${JOB_STATUS} |"
            echo ""
            echo "### Step timings"
            echo ""
            echo "| Step | Duration (s) | Status |"
            echo "|------|--------------|--------|"
            if [ -f "$timing_file" ]; then
              while IFS='|' read -r name dur stat; do
                echo "| ${name} | ${dur} | ${stat} |"
              done < "$timing_file"
            else
              echo "| (none) | — | — |"
            fi
            echo ""
            echo "### Performance / Cache Observation"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Node version | ${node_version} |"
            echo "| npm version | ${npm_version} |"
            echo "| npm cache enabled | yes (setup-node) |"
            echo "| cache-dependency-path | package-lock.json |"
            echo "| package-lock hash | \`${lock_hash}\` |"
            echo "| npm ci duration | ${npm_ci_duration} |"
            echo "| cache observation note | setup-node caches npm package cache only (not node_modules). Compare npm ci duration across runs with the same package-lock hash; lockfile changes alter cache key. Strict cache-hit is not logged in v1.15.0. |"
            echo ""
            echo "### Notes"
            echo ""
            echo "- Failure details: see the workflow log for the first failing step."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality pipeline reports
        uses: actions/upload-artifact@v7
        with:
          name: quality-pipeline-reports-${{ github.run_id }}
          path: reports/quality-pipeline/latest/
          retention-days: 14
